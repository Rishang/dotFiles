# https://github.com/Rishang/localSetup

repos:
  - name: sublime_text 4
    apt:
      key: "https://download.sublimetext.com/sublimehq-pub.gpg"
      repo: deb https://download.sublimetext.com/ apt/stable/
      packages:
      - sublime-text
    yum:
      key: "https://download.sublimetext.com/sublimehq-rpm-pub.gpg"
      repo: "https://download.sublimetext.com/rpm/stable/x86_64/sublime-text.repo"
      packages:
      - sublime-text
  
  - name: Docker
    yum:
      repo: "https://download.docker.com/linux/centos/docker-ce.repo"
      packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io

    apt:
      key: https://download.docker.com/linux/ubuntu/gpg
      repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu   impish stable"
      packages: 
        - docker-ce 
        - docker-ce-cli
        - containerd.io
  
  - name: Table Plus
    apt:
      key: "http://deb.tableplus.com/apt.tableplus.com.gpg.key"
      repo: "deb [arch=amd64] https://deb.tableplus.com/debian tableplus main"
      packages:
      - tableplus


packages:
  apt:
    - curl
    - gron
    - python3
    - golang
    - htop
    - sqlmap
    - masscan
    - 
  yum:
    - httpd

snap:
  packages:
    - slack
    - postman
    - discord
    - amass
  classic:
    - code

go:
  install:
    - github.com/tomnomnom/gf@latest
    - github.com/projectdiscovery/nuclei/v2/cmd/nuclei@latest
    - github.com/OJ/gobuster/v3@latest
    - github.com/ffuf/ffuf@latest
    - github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
    - github.com/projectdiscovery/dnsx/cmd/dnsx@latest

pip:
  install:
    - django
    - fastapi[standard]
    - pandas
    - bs4
    - scapy
    - typer
    - typer-cli
    - click
    - pymongo
    - loguru
    - aiohttp
    - sqlmodel
    - selenium
    
